name: 'RTC Reward on Merge'
description: 'Automatically award RTC tokens to contributors when their PR is merged'
author: 'Ivan-LB'

branding:
  icon: 'award'
  color: 'orange'

inputs:
  node-url:
    description: 'RustChain node URL (e.g. https://50.28.86.131)'
    required: true
    default: 'https://50.28.86.131'
  amount:
    description: 'RTC amount to award per merged PR'
    required: false
    default: '5'
  wallet-from:
    description: 'Wallet name to send from (must exist on the node)'
    required: true
  admin-key:
    description: 'Admin private key for signing the reward transaction'
    required: true
  dry-run:
    description: 'Set to "true" to simulate without sending real RTC'
    required: false
    default: 'false'
  wallet-field:
    description: 'PR body field to extract recipient wallet (e.g. "RTC Wallet:")'
    required: false
    default: 'RTC Wallet:'
  github-token:
    description: 'GitHub token for posting reward confirmation comment on the PR'
    required: false
    default: '${{ github.token }}'

outputs:
  tx-id:
    description: 'Transaction ID of the reward payment (empty in dry-run)'
  recipient:
    description: 'Wallet address that received the reward'
  amount-sent:
    description: 'Actual RTC amount sent'

runs:
  using: 'node20'
  main: 'dist/index.js'
  env:
    GITHUB_TOKEN: ${{ inputs.github-token }}
    REPO_OWNER:   ${{ github.repository_owner }}
    REPO_NAME:    ${{ github.event.repository.name }}
    PR_BODY:      ${{ github.event.pull_request.body }}
    PR_AUTHOR:    ${{ github.event.pull_request.user.login }}
    PR_NUMBER:    ${{ github.event.number }}
    PR_TITLE:     ${{ github.event.pull_request.title }}
