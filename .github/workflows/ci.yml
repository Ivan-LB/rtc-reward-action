name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Dry-run smoke test
        env:
          INPUT_NODE_URL:    'https://50.28.86.131'
          INPUT_AMOUNT:      '1'
          INPUT_WALLET_FROM: 'test_wallet'
          INPUT_ADMIN_KEY:   'test_key'
          INPUT_DRY_RUN:     'true'
          PR_BODY:           'RTC Wallet: test_recipient'
          PR_AUTHOR:         'tester'
          PR_NUMBER:         '1'
          PR_TITLE:          'Test PR'
        run: node dist/index.js
